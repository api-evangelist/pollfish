meters:
- name: completed_responses
  description: Completed survey responses purchased by a researcher, billed per response.
  unit: responses
  aggregation: sum
  dimensions:
  - account
  - survey
  - country
- name: targeting_filters
  description: Demographic targeting filters applied to a survey, each adding a per-response surcharge.
  unit: filters
  aggregation: sum
  dimensions:
  - account
  - survey
- name: publisher_revenue_cpa
  description: Revenue earned by a publisher per completed survey (CPA in US dollar cents), reported via the Dashboard API.
  unit: usd_cents
  aggregation: sum
  dimensions:
  - app
  - provider
  - country
- name: survey_completions
  description: Count of surveys completed through a publisher app, driving both revenue and s2s postback volume.
  unit: completions
  aggregation: sum
  dimensions:
  - app
  - provider
principles:
- name: Visibility
  description: For researchers, track responses purchased and targeting surcharges per survey; for publishers, track CPA revenue per app, provider, and country via the revenue and revenuePerCountry endpoints.
- name: Allocation
  description: Name surveys and publisher apps per project/team so response spend and CPA revenue map to internal cost and revenue centers.
- name: Optimization
  description: Researchers reduce cost by minimizing unnecessary targeting filters, keeping surveys short, and right-sizing response counts; publishers optimize fill and revenue by enabling third-party mediation surveys and tuning placement behavior.
- name: Accountability
  description: Reconcile Dashboard API revenue reports against Pollfish payouts monthly, and review researcher response spend against research budgets.
