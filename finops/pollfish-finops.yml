description: >-
  FinOps view of Pollfish spend and earnings. Pollfish is two-sided. On the
  researcher (demand) side it is a cost center: pay-as-you-go, billed per
  completed survey response (from ~$0.95/response, 100-response minimum) with
  surcharges per demographic targeting filter, survey length, and audience
  difficulty - so cost scales with responses collected and targeting complexity,
  not with API calls. On the publisher (supply) side it is a revenue center:
  integrating the SDK / survey-serving API is free and the publisher earns a
  revenue share (CPA in US dollar cents) per completed survey, which the Dashboard
  API surfaces through the revenue and revenuePerCountry endpoints for
  reconciliation against Pollfish payouts. Pollfish is owned by Prodege LLC.
notes: >-
  Per-response researcher rates are indicative and set live in the survey builder;
  publisher revenue share is set by Pollfish and mediation partners. The APIs
  themselves are not separately metered - model spend on responses purchased and
  model income on completed-survey CPA. Verify current rates on pollfish.com/pricing.
